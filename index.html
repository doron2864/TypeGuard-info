<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeGuard — Keyboard Language Alert</title>
<meta name="description" content="TypeGuard plays a sound when you start typing to indicate which keyboard language is active. Free, lightweight, works with all languages.">
<meta property="og:title" content="TypeGuard — Keyboard Language Alert">
<meta property="og:description" content="Never type in the wrong language again. Free keyboard language alert for Windows.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#3b82f6">
<link rel="icon" href="app.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue-500:#3b82f6;--blue-600:#2563eb;--blue-700:#1d4ed8;
  --blue-50:#eff6ff;--blue-100:#dbeafe;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;
  --gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;
  --green-500:#22c55e;--green-600:#16a34a;
  --radius:12px;--radius-lg:16px;--radius-xl:24px;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.1);
  --shadow-xl:0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.1);
  --max-w:1120px;
}
html{scroll-behavior:smooth;scroll-padding-top:80px}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  color:var(--gray-800);background:#fff;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
html[dir="rtl"] body{direction:rtl;text-align:right}

/* ── NAV ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(255,255,255,.85);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--gray-200);
  transition:box-shadow .3s;
}
.nav.scrolled{box-shadow:var(--shadow)}
.nav-inner{
  max-width:var(--max-w);margin:0 auto;padding:0 24px;
  display:flex;align-items:center;height:64px;gap:8px;
}
.nav-logo{font-weight:800;font-size:1.2rem;color:var(--blue-600);text-decoration:none;margin-inline-end:auto}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-links a{
  color:var(--gray-600);text-decoration:none;font-size:.875rem;font-weight:500;
  padding:6px 12px;border-radius:8px;transition:all .2s;
}
.nav-links a:hover{color:var(--gray-900);background:var(--gray-100)}
.lang-select{
  position:relative;margin-inline-start:8px;
}
.lang-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border:1px solid var(--gray-200);border-radius:8px;
  background:#fff;cursor:pointer;font-size:.8rem;font-weight:500;
  color:var(--gray-700);transition:all .2s;font-family:inherit;
}
.lang-btn:hover{border-color:var(--blue-500);color:var(--blue-600)}
.lang-btn svg{width:16px;height:16px;flex-shrink:0}
.lang-dropdown{
  position:absolute;top:calc(100% + 4px);right:0;
  background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);
  box-shadow:var(--shadow-xl);min-width:180px;
  opacity:0;visibility:hidden;transform:translateY(-4px);
  transition:all .2s;z-index:200;max-height:340px;overflow-y:auto;
}
html[dir="rtl"] .lang-dropdown{right:auto;left:0}
.lang-dropdown.open{opacity:1;visibility:visible;transform:translateY(0)}
.lang-dropdown button{
  display:block;width:100%;padding:8px 16px;border:none;background:none;
  text-align:start;cursor:pointer;font-size:.85rem;color:var(--gray-700);
  transition:background .15s;font-family:inherit;
}
.lang-dropdown button:first-child{border-radius:var(--radius) var(--radius) 0 0}
.lang-dropdown button:last-child{border-radius:0 0 var(--radius) var(--radius)}
.lang-dropdown button:hover{background:var(--blue-50);color:var(--blue-700)}
.lang-dropdown button.active{background:var(--blue-50);color:var(--blue-600);font-weight:600}
.nav-cta{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 18px;background:var(--blue-600);color:#fff;
  border-radius:8px;text-decoration:none;font-size:.85rem;font-weight:600;
  transition:all .2s;border:none;cursor:pointer;margin-inline-start:8px;
}
.nav-cta:hover{background:var(--blue-700);box-shadow:var(--shadow)}
.nav-cta svg{width:14px;height:14px}

/* ── HERO ── */
.hero{
  padding:120px 24px 80px;
  background:linear-gradient(135deg,var(--blue-50) 0%,#fff 50%,var(--blue-50) 100%);
  text-align:center;overflow:hidden;
}
.hero-inner{max-width:var(--max-w);margin:0 auto}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 16px;background:#fff;border:1px solid var(--gray-200);
  border-radius:100px;font-size:.8rem;font-weight:500;color:var(--gray-600);
  margin-bottom:24px;
}
.hero-badge .dot{width:8px;height:8px;background:var(--green-500);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1{
  font-size:clamp(2rem,5vw,3.5rem);font-weight:800;
  line-height:1.15;color:var(--gray-900);
  max-width:700px;margin:0 auto 20px;
}
.hero p.subtitle{
  font-size:clamp(1rem,2vw,1.2rem);color:var(--gray-500);
  max-width:560px;margin:0 auto 36px;line-height:1.7;
}
.hero-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 32px;background:var(--blue-600);color:#fff;
  border-radius:var(--radius);font-size:1rem;font-weight:600;
  text-decoration:none;transition:all .2s;border:none;cursor:pointer;
  box-shadow:0 4px 14px rgba(59,130,246,.4);
}
.btn-primary:hover{background:var(--blue-700);transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,.5)}
.btn-primary svg{width:18px;height:18px}
.btn-secondary{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 32px;background:#fff;color:var(--gray-700);
  border:1px solid var(--gray-200);border-radius:var(--radius);
  font-size:1rem;font-weight:500;text-decoration:none;transition:all .2s;
}
.btn-secondary:hover{border-color:var(--gray-400);background:var(--gray-50)}
.hero-version{font-size:.8rem;color:var(--gray-400);margin-top:12px}

/* ── DEMO MOCKUP ── */
.demo-container{
  max-width:480px;margin:48px auto 0;
  perspective:800px;
}
.demo-notification{
  background:var(--gray-900);border-radius:var(--radius-lg);
  padding:20px 28px;display:flex;align-items:center;gap:16px;
  box-shadow:var(--shadow-xl),0 0 60px rgba(59,130,246,.15);
  animation:float 4s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.demo-bars{display:flex;gap:3px;align-items:flex-end;height:28px;flex-shrink:0}
.demo-bars .bar{
  width:4px;background:var(--blue-500);border-radius:2px;
  animation:barPulse 1.2s ease-in-out infinite;
}
.demo-bars .bar:nth-child(1){height:10px;animation-delay:0s}
.demo-bars .bar:nth-child(2){height:20px;animation-delay:.15s}
.demo-bars .bar:nth-child(3){height:28px;animation-delay:.3s}
.demo-bars .bar:nth-child(4){height:16px;animation-delay:.45s}
.demo-bars .bar:nth-child(5){height:24px;animation-delay:.6s}
@keyframes barPulse{
  0%,100%{transform:scaleY(1);opacity:1}
  50%{transform:scaleY(.5);opacity:.6}
}
.demo-text{text-align:start}
.demo-app{font-size:.75rem;color:var(--blue-400);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.demo-lang{
  font-size:1.4rem;font-weight:700;color:#fff;
  min-width:140px;
}
.demo-lang span{
  display:inline-block;
  animation:langFade 6s ease-in-out infinite;
}
@keyframes langFade{0%,40%{opacity:1}45%,55%{opacity:0}60%,100%{opacity:1}}
.demo-lang .lang-b{animation-delay:3s;position:absolute}

/* ── FEATURES ── */
.features{padding:80px 24px;background:#fff}
.features-inner{max-width:var(--max-w);margin:0 auto}
.section-title{
  font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;
  text-align:center;color:var(--gray-900);margin-bottom:12px;
}
.section-subtitle{
  text-align:center;color:var(--gray-500);font-size:1rem;
  max-width:480px;margin:0 auto 48px;
}
.features-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:24px;
}
.feature-card{
  padding:28px;border:1px solid var(--gray-100);border-radius:var(--radius-lg);
  transition:all .3s;background:#fff;
}
.feature-card:hover{
  border-color:var(--blue-100);box-shadow:var(--shadow-lg);
  transform:translateY(-2px);
}
.feature-icon{
  width:44px;height:44px;border-radius:var(--radius);
  background:var(--blue-50);display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;color:var(--blue-600);
}
.feature-icon svg{width:22px;height:22px}
.feature-card h3{font-size:1.05rem;font-weight:700;color:var(--gray-900);margin-bottom:8px}
.feature-card p{font-size:.9rem;color:var(--gray-500);line-height:1.65}

/* ── SCREENSHOT ── */
.screenshots{padding:80px 24px;background:var(--gray-50)}
.screenshots-inner{max-width:var(--max-w);margin:0 auto}
.screenshot-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:24px;margin-top:48px;
}
.screenshot-slot{
  aspect-ratio:16/10;border-radius:var(--radius-lg);
  border:2px dashed var(--gray-200);background:#fff;
  display:flex;align-items:center;justify-content:center;
  color:var(--gray-400);font-size:.9rem;text-align:center;
  padding:24px;transition:all .3s;
}
.screenshot-slot:hover{border-color:var(--blue-300);color:var(--blue-500)}
.screenshot-slot img{
  width:100%;height:100%;object-fit:cover;border-radius:calc(var(--radius-lg) - 2px);
}

/* ── FAQ ── */
.faq{padding:80px 24px;background:#fff}
.faq-inner{max-width:680px;margin:0 auto}
.faq-item{border-bottom:1px solid var(--gray-100)}
.faq-item:first-child{border-top:1px solid var(--gray-100)}
.faq-q{
  width:100%;padding:20px 0;border:none;background:none;
  display:flex;justify-content:space-between;align-items:center;gap:16px;
  cursor:pointer;text-align:start;font-family:inherit;
  font-size:1rem;font-weight:600;color:var(--gray-800);
  transition:color .2s;
}
.faq-q:hover{color:var(--blue-600)}
.faq-q svg{
  width:20px;height:20px;flex-shrink:0;color:var(--gray-400);
  transition:transform .3s;
}
.faq-item.open .faq-q svg{transform:rotate(180deg)}
.faq-a{
  max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;
}
.faq-item.open .faq-a{max-height:300px;padding-bottom:20px}
.faq-a p{font-size:.9rem;color:var(--gray-500);line-height:1.7}

/* ── CTA ── */
.cta{
  padding:80px 24px;
  background:linear-gradient(135deg,var(--blue-600),var(--blue-700));
  text-align:center;color:#fff;
}
.cta-inner{max-width:var(--max-w);margin:0 auto}
.cta h2{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;margin-bottom:12px}
.cta p{font-size:1rem;opacity:.85;margin-bottom:32px;max-width:480px;margin-left:auto;margin-right:auto}
.btn-white{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 32px;background:#fff;color:var(--blue-700);
  border-radius:var(--radius);font-size:1rem;font-weight:600;
  text-decoration:none;transition:all .2s;
  box-shadow:0 4px 14px rgba(0,0,0,.15);
}
.btn-white:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.btn-white svg{width:18px;height:18px}

/* ── FOOTER ── */
.footer{padding:40px 24px;background:var(--gray-900);color:var(--gray-400);font-size:.85rem}
.footer-inner{
  max-width:var(--max-w);margin:0 auto;
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:16px;
}
.footer a{color:var(--gray-400);text-decoration:none;transition:color .2s}
.footer a:hover{color:#fff}
.footer-links{display:flex;gap:20px}
.footer-brand{display:flex;align-items:center;gap:8px}
.footer-brand .free{color:var(--green-500);font-weight:500}

/* ── ANIMATIONS ── */
.fade-in{opacity:0;transform:translateY(20px);transition:all .6s ease-out}
.fade-in.visible{opacity:1;transform:translateY(0)}

/* ── MOBILE ── */
@media(max-width:768px){
  .nav-links a:not(.nav-cta){display:none}
  .hero{padding:100px 20px 60px}
  .hero h1{font-size:1.8rem}
  .features-grid{grid-template-columns:1fr}
  .screenshot-grid{grid-template-columns:1fr}
  .demo-notification{padding:16px 20px}
  .demo-lang{font-size:1.1rem;min-width:100px}
  .footer-inner{flex-direction:column;text-align:center}
}
@media(max-width:480px){
  .hero-buttons{flex-direction:column;align-items:center}
  .btn-primary,.btn-secondary{width:100%;justify-content:center}
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--gray-50)}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-400)}
</style>
</head>

<!-- ════════ FAQ ════════ -->
<section class="faq" id="faq">
<div class="faq-inner">
  <h2 class="section-title" data-i18n="faq_title"></h2>

// Demo language cycling
const DEMO_LANGS = ['English','Français','中文','Español','Русский','Deutsch','日本語','العربية','Português','한국어','Türkçe','עברית'];

// ────────────────────────────────────────
// LANGUAGE ENGINE
// ────────────────────────────────────────
let currentLang = 'en';

function detectLang() {
  const nav = (navigator.language || navigator.userLanguage || 'en').slice(0,2).toLowerCase();
  if (T[nav]) return nav;
  return 'en';
}

function setLang(code) {
  currentLang = code;
  const langInfo = LANGS.find(l => l.code === code);
  const t = T[code] || T.en;

  // Set dir & lang
  document.documentElement.lang = code;
  document.documentElement.dir = langInfo.rtl ? 'rtl' : 'ltr';

  // Update all translatable elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });

  // Update lang selector label
  document.getElementById('langLabel').textContent = langInfo.name;

  // Mark active in dropdown
  document.querySelectorAll('.lang-dropdown button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === code);
  });

  // Save preference
  try { localStorage.setItem('tg-lang', code); } catch(e) {}
}

// Build language dropdown
function buildLangDropdown() {
  const dd = document.getElementById('langDropdown');
  dd.innerHTML = '';
  LANGS.forEach(l => {
    const btn = document.createElement('button');
    btn.textContent = l.name;
    btn.dataset.lang = l.code;
    btn.addEventListener('click', () => { setLang(l.code); dd.classList.remove('open'); });
    dd.appendChild(btn);
  });
}

// Toggle dropdown
document.getElementById('langBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('langDropdown').classList.toggle('open');
});
document.addEventListener('click', () => document.getElementById('langDropdown').classList.remove('open'));

// ────────────────────────────────────────
// DEMO ANIMATION
// ────────────────────────────────────────
function animateDemo() {
  const el = document.getElementById('demoLang');
  let idx = 0;
  function cycle() {
    el.style.opacity = '0';
    el.style.transform = 'translateY(6px)';
    setTimeout(() => {
      el.textContent = DEMO_LANGS[idx];
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
      idx = (idx + 1) % DEMO_LANGS.length;
    }, 300);
  }
  el.style.transition = 'opacity .3s, transform .3s';
  cycle();
  setInterval(cycle, 2500);
}

// ────────────────────────────────────────
// FAQ ACCORDION
// ────────────────────────────────────────
document.querySelectorAll('.faq-q').forEach(btn => {
  btn.addEventListener('click', () => {
    const item = btn.parentElement;
    const wasOpen = item.classList.contains('open');
    document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
    if (!wasOpen) item.classList.add('open');
  });
});

// ────────────────────────────────────────
// SCROLL ANIMATIONS
// ────────────────────────────────────────
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.1 });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

// Nav shadow on scroll
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

// ────────────────────────────────────────
// INIT
// ────────────────────────────────────────
buildLangDropdown();
const saved = localStorage.getItem('tg-lang');
setLang(saved || detectLang());
animateDemo();
</script>
